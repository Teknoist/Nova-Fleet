name: Windows release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Kaynak kodu al
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Bağımlılıkları kur
        run: npm ci

      - name: Testleri çalıştır
        run: npm test

      - name: Windows kurulum paketini oluştur
        run: npm run package:win

      - name: Derleme çıktısını sakla
        uses: actions/upload-artifact@v4
        with:
          name: Nova-Fleet-Windows
          path: |
            release/Nova-Fleet-Setup-*.exe
            release/Nova-Fleet-Setup-*.exe.blockmap

      - name: GitHub Release oluştur
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/Nova-Fleet-Setup-*.exe
            release/Nova-Fleet-Setup-*.exe.blockmap
