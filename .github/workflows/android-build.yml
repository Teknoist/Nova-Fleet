name: Build Android APK

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'android/**'
      - 'src/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/android-build.yml'
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'android/**'
      - 'src/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/android-build.yml'

permissions:
  contents: write

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Run shared tests
        run: npm test

      - name: Sync Android project
        run: npm run android:sync

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Name APK
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cp android/app/build/outputs/apk/debug/app-debug.apk "Nova-Fleet-Android-${VERSION}.apk"

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: Nova-Fleet-Android-${{ github.sha }}
          path: Nova-Fleet-Android-*.apk
          if-no-files-found: error

      - name: Add APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: Nova-Fleet-Android-*.apk
